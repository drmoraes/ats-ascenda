services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ats
    ports:
      # Host 5433 -> container 5432 (evita conflito com Postgres local na 5432).
      # A API conecta internamente via "postgres:5432", sem depender disto.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ats"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/ats-ascenda-resumes &&
      echo 'bucket pronto';
      "

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Fixa a URL pública -> os tokens sempre têm iss=http://localhost:8080/...
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak-realm.json:/opt/keycloak/data/import/ats-realm.json:ro

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      # App conecta como role SEM privilégios de superusuário -> RLS é aplicado.
      DATABASE_URL: postgresql://ats_app:ats_app_pw@postgres:5432/ats?schema=public
      # Tarefas administrativas (schema/RLS/seed) usam o superusuário.
      ADMIN_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ats?schema=public
      REDIS_URL: redis://redis:6379
      AWS_REGION: us-east-1
      S3_RESUMES_BUCKET: ats-ascenda-resumes
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
      AI_PARSER_API_BASE_URL: https://api.anthropic.com/v1
      AI_PARSER_API_KEY: ${AI_PARSER_API_KEY:-changeme-set-a-real-key}
      AI_PARSER_MODEL: claude-sonnet-5
      AI_PARSER_TIMEOUT_MS: 30000
      # iss vem do host (localhost); JWKS é buscado internamente (keycloak).
      # O jose valida issuer e JWKS separadamente, então podem divergir.
      KEYCLOAK_ISSUER: http://localhost:8080/realms/ats
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/ats/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: ats-backend
      KEYCLOAK_TENANT_CLAIM: tenant_id
      CANDIDATE_JWT_SECRET: dev-only-secret-change-me-32bytes-min-000
      CANDIDATE_JWT_ISSUER: ats-ascenda-candidate
      CANDIDATE_TOKEN_TTL_SECONDS: 3600
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
